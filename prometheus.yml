global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']

  - job_name: 'llm-service'
    static_configs:
      - targets: ['llm-service:8001']

  - job_name: 'memory-service'
    static_configs:
      - targets: ['memory-service:8002']

  - job_name: 'cognition-service'
    static_configs:
      - targets: ['cognition-service:8003']

  - job_name: 'vision-service'
    static_configs:
      - targets: ['vision-service:8004']

  - job_name: 'multimodal-service'
    static_configs:
      - targets: ['multimodal-service:8005']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
